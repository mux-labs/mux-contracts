name: Verify WASM Hash

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-wasm:
    name: Build and Verify WASM Hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run WASM hash verification script tests
        run: bash scripts/test-verify-wasm-hash.sh

      - name: Compute and print WASM hashes (for reference)
        run: |
          echo "=== WASM SHA-256 Hashes ==="
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            [ -f "$wasm" ] || continue
            hash=$(sha256sum "$wasm" | awk '{print $1}')
            echo "$hash  $(basename $wasm)"
          done

      # Uncomment and populate EXPECTED_HASHES when locking production hashes:
      # - name: Verify expected production WASM hashes
      #   run: |
      #     bash scripts/verify-wasm-hash.sh \
      #       target/wasm32-unknown-unknown/release/mux_account.wasm \
      #       ${{ vars.MUX_ACCOUNT_WASM_HASH }}
