[graph]
targets = [
    "wasm32-unknown-unknown",
    "x86_64-unknown-linux-gnu",
]

[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
]
deny = [
    "GPL-1.0-only",
    "GPL-2.0-only",
    "GPL-3.0-only",
]
copyleft = "deny"
allow-osi-fsf-free = "neither"
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
highlight = "all"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
